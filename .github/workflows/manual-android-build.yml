name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print commit info (for verification)
        run: |
          echo "=== BUILD INFO ==="
          echo "Commit SHA: $(git rev-parse HEAD)"
          echo "Short SHA: $(git rev-parse --short HEAD)"
          echo "Commit message: $(git log -1 --pretty=%B)"
          echo "Run number: ${{ github.run_number }}"
          echo "=================="

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.7 (with clean cache option)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
          cache-read-only: false

      - name: Build debug APK (clean)
        run: |
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace || gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wh4k-debug-${{ github.run_number }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error
          overwrite: true
